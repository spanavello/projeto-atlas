<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atlas - Olimpo</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        .fundo-atlas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./img/atlas.png');
            background-size: cover; background-position: center; background-repeat: no-repeat; z-index: 1;
        }
        .box { 
            position: absolute; left: 50%; top: 70%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); padding: 30px; border-radius: 20px; 
            border: 2px solid #00a2ff; box-shadow: 0 0 30px #00a2ff; width: 320px; 
            text-align: center; color: white; z-index: 10;
        }
        input { padding: 12px; width: 85%; border-radius: 10px; border: none; font-size: 1.1em; text-align: center; margin-bottom: 10px; background: #fff; color: #000; }
        button { width: 90%; padding: 12px; background: #00a2ff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0081cc; }
        h1 { margin: 0 0 10px 0; color: #00a2ff; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="fundo-atlas"></div>
    <div class="box">
        <h1 id="msg">ATLAS</h1>
        <input type="password" id="senha" placeholder="SENHA" maxlength="11">
        <button onclick="entrar()">ENTRAR</button>
    </div>

    <script>
        async function entrar() {
            const senhaInput = document.getElementById('senha');
            const senha = senhaInput.value;

            if (!senha) return;

            if (senha === "123456") {
                const cpf = prompt("ADMIN CPF:");
                if (cpf === "00000000000") {
                    window.location.href = "admin.html";
                    return;
                } else {
                    alert("ACESSO NEGADO");
                    return;
                }
            }

            try {
                const res = await fetch('http://localhost:3000/entrada-aluno', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senha })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('aluno_nome', data.nome);
                    localStorage.setItem('aluno_dias', data.dias);
                    localStorage.setItem('aluno_senha', senha);
                    window.location.href = "bemvindo.html";
                } else {
                    alert("ACESSO NEGADO OU PLANO EXPIRADO");
                }
            } catch (e) {
                alert("ERRO DE CONEXÃO COM O SERVIDOR");
            }
        }

        document.getElementById('senha').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') entrar();
        });
    </script>
</body>
</html>
